<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=550, initial-scale=1.0">
  <title>Mundial 2026 - 365Scores</title>
  <link rel="stylesheet" href="styles.css?v=365-live-01">
</head>

<body>
  <main class="panel">
    <header class="panel-header">
      <div>
        <h1>Mundial 2026</h1>
        <p>Fechas, resultados y marcadores en vivo</p>
      </div>
      <div class="status-box">
        <span id="refresh-state">365Scores</span>
        <small id="updated-at">Act. --:--</small>
      </div>
    </header>

    <section class="panel-strip">
      <strong>Partidos / resultados</strong>
      <span>Actualización automática cada 1 minuto</span>
    </section>

    <section id="widget-scroll" class="widget-scroll">
      <div id="widget-zone" class="widget-zone">
        <div class="loading">Cargando resultados del Mundial...</div>
      </div>
    </section>
  </main>

  <script src="app.js?v=365-live-01"></script>
</body>
</html>
