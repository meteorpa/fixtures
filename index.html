<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=550, initial-scale=1.0" />
  <title>Mundial 2026</title>

  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 550px;
      height: 1030px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .worldcup-panel {
      width: 550px;
      height: 1030px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #ffffff;
    }

    .worldcup-header {
      height: 88px;
      padding: 15px 18px;
      background: linear-gradient(135deg, #171d24 0%, #2b3540 100%);
      color: #ffffff;
      flex: 0 0 auto;
    }

    .worldcup-title {
      font-size: 25px;
      line-height: 28px;
      font-weight: 900;
    }

    .worldcup-subtitle {
      margin-top: 4px;
      font-size: 14px;
      color: #c9d1d8;
      font-weight: 700;
    }

    .tabs-status {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #ffffff;
      border-bottom: 1px solid #dce3e8;
      flex: 0 0 auto;
    }

    .tab-pill {
      flex: 1;
      height: 28px;
      border-radius: 999px;
      background: #edf2f5;
      color: #5f6a72;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: all 0.25s ease;
    }

    .tab-pill.active {
      background: #03a9f4;
      color: #ffffff;
    }

    .widget-stage {
      width: 550px;
      height: 900px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
      flex: 0 0 auto;
    }

    .widget-pane {
      position: absolute;
      inset: 0;
      width: 550px;
      height: 900px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease;
      background: #ffffff;
      overflow: hidden;
    }

    .widget-pane.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .pane-title {
      height: 34px;
      padding: 8px 14px;
      background: #ffffff;
      border-bottom: 1px solid #dce3e8;
      color: #20282e;
      font-size: 13px;
      font-weight: 900;
    }

    .pane-content {
      width: 550px;
      height: 866px;
      overflow: hidden;
      background: #ffffff;
    }

    api-sports-widget {
      display: block;
      width: 550px;
      height: 866px;

      --primary-font-size: 0.80rem;
      --secondary-font-size: 0.72rem;
      --button-font-size: 0.72rem;
      --title-font-size: 0.84rem;
    }

    body .modal-widget {
      width: 92%;
      max-width: 520px;
    }

    body .modal-widget-content {
      padding: 0;
      height: 80vh;
    }
  </style>
</head>

<body>
  <div class="worldcup-panel">

    <div class="worldcup-header">
      <div class="worldcup-title">Mundial 2026</div>
      <div class="worldcup-subtitle">Resultados, próximos partidos y avance de grupos</div>
    </div>

    <div class="tabs-status">
      <div class="tab-pill active" data-tab-label="0">Resultados</div>
      <div class="tab-pill" data-tab-label="1">Próximos</div>
      <div class="tab-pill" data-tab-label="2">Grupos</div>
    </div>

    <div class="widget-stage">

      <section class="widget-pane active" data-pane="0">
        <div class="pane-title">Resultados / partidos en vivo</div>
        <div class="pane-content">
          <api-sports-widget
            data-type="league"
            data-league="1"
            data-season="2026"
            data-tab="results"
            data-refresh="300"
            data-target-game="modal">
          </api-sports-widget>
        </div>
      </section>

      <section class="widget-pane" data-pane="1">
        <div class="pane-title">Próximos partidos</div>
        <div class="pane-content">
          <api-sports-widget
            data-type="league"
            data-league="1"
            data-season="2026"
            data-tab="fixtures"
            data-refresh="300"
            data-target-game="modal">
          </api-sports-widget>
        </div>
      </section>

      <section class="widget-pane" data-pane="2">
        <div class="pane-title">Clasificación / grupos</div>
        <div class="pane-content">
          <api-sports-widget
            data-type="standings"
            data-league="1"
            data-season="2026"
            data-refresh="300">
          </api-sports-widget>
        </div>
      </section>

    </div>

    <api-sports-widget
      data-type="config"
      data-key="491d66a0e98cbe81dfa0706d2b6c5d33"
      data-sport="football"
      data-lang="es"
      data-theme="white"
      data-show-errors="true"
      data-show-logos="true"
      data-refresh="300"
      data-player-injuries="false"
      data-team-squad="false"
      data-team-statistics="false"
      data-player-statistics="false"
      data-game-tab="statistics"
      data-standings="true"
      data-target-standings="modal"
      data-target-game="modal"
      data-target-player="modal"
      data-target-team="modal"
      data-league="1"
      data-season="2026">
    </api-sports-widget>

  </div>

  <script>
    const panes = document.querySelectorAll('.widget-pane');
    const labels = document.querySelectorAll('.tab-pill');

    let currentPane = 0;
    const totalPanes = panes.length;
    const rotationTime = 60000; // 1 minuto por pestaña

    function showPane(index) {
      panes.forEach(pane => pane.classList.remove('active'));
      labels.forEach(label => label.classList.remove('active'));

      const pane = document.querySelector(`[data-pane="${index}"]`);
      const label = document.querySelector(`[data-tab-label="${index}"]`);

      if (pane) pane.classList.add('active');
      if (label) label.classList.add('active');
    }

    setInterval(() => {
      currentPane = (currentPane + 1) % totalPanes;
      showPane(currentPane);
    }, rotationTime);
  </script>
</body>
</html>
