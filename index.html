<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=550, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Mundial 2026 - Panel liviano</title>
  <link rel="stylesheet" href="styles.css?v=panel-liviano-365-02" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-left">
        <div class="kicker">FIFA WORLD CUP</div>
        <h1>Mundial 2026</h1>
        <p>Próximo partido · En vivo · Resultados</p>
      </div>
      <div class="hero-right">
        <div class="live-dot"></div>
        <span id="updateLabel">Act. --:--</span>
      </div>
    </header>

    <section class="featured-grid">
      <article class="featured-card next">
        <div class="card-topline">
          <span>Próximo partido</span>
          <strong id="nextGroup">--</strong>
        </div>
        <div class="match-main">
          <div class="team">
            <img id="nextHomeLogo" src="" alt="" />
            <strong id="nextHome">--</strong>
          </div>
          <div class="center-time">
            <span id="nextDate">--</span>
            <strong id="nextTime">--:--</strong>
          </div>
          <div class="team away">
            <img id="nextAwayLogo" src="" alt="" />
            <strong id="nextAway">--</strong>
          </div>
        </div>
      </article>

      <article class="featured-card live" id="liveCard">
        <div class="card-topline">
          <span>En vivo</span>
          <strong id="liveStatus">Sin partido en vivo</strong>
        </div>
        <div class="match-main">
          <div class="team">
            <img id="liveHomeLogo" src="" alt="" />
            <strong id="liveHome">--</strong>
          </div>
          <div class="center-score">
            <strong id="liveScore">--</strong>
            <span id="liveMinute">--</span>
          </div>
          <div class="team away">
            <img id="liveAwayLogo" src="" alt="" />
            <strong id="liveAway">--</strong>
          </div>
        </div>
      </article>
    </section>

    <section class="ticker">
      <div class="ticker-title">Vista rápida</div>
      <div class="ticker-text" id="tickerText">Cargando información...</div>
    </section>

    <section class="past-results">
      <div class="past-head">
        <div>
          <strong>Últimos resultados</strong>
          <span>Partidos ya finalizados</span>
        </div>
        <div class="past-pill" id="pastCount">0</div>
      </div>
      <div class="past-list" id="pastResultsList"></div>
    </section>

    <section class="list-header">
      <div>
        <strong>Partidos y resultados</strong>
        <span>Calendario compacto</span>
      </div>
      <div class="count-pill" id="countPill">0</div>
    </section>

    <section class="scroll-area" id="scrollArea">
      <div id="matchesList" class="matches-list"></div>
    </section>
  </main>

  <script src="app.js?v=panel-liviano-365-02"></script>
</body>
</html>
