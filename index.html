<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=550, initial-scale=1.0">
  <title>Mundial 2026 - Resultados</title>
  <link rel="stylesheet" href="styles.css?v=football-data-01">
</head>
<body>
  <div id="worldcup-fixture-widget">
    <div class="fixture-topbar">
      <div class="fixture-title-row">
        <div>
          <div class="fixture-title">Mundial 2026</div>
          <div class="fixture-subtitle">Resultados, próximos partidos y marcadores en vivo</div>
        </div>
        <div class="fixture-source">
          <span id="source-label">Cargando</span><br>
          <span id="updated-label">Act. --:--</span>
        </div>
      </div>
      <div class="fixture-summary">
        <div class="summary-box"><div class="summary-value" id="summary-live">0</div><div class="summary-label">En vivo</div></div>
        <div class="summary-box"><div class="summary-value" id="summary-upcoming">0</div><div class="summary-label">Próximos</div></div>
        <div class="summary-box"><div class="summary-value" id="summary-finished">0</div><div class="summary-label">Finalizados</div></div>
      </div>
    </div>
    <div class="next-strip"><div class="next-label">Próximo</div><div class="next-text" id="next-text">Cargando próximos partidos...</div></div>
    <div class="fixture-tabs"><button class="fixture-tab active" data-filter="all">Todos</button><button class="fixture-tab" data-filter="live">En vivo</button><button class="fixture-tab" data-filter="upcoming">Próximos</button><button class="fixture-tab" data-filter="finished">Finalizados</button></div>
    <div id="fixture-scroll"><div class="empty-state">Cargando calendario del Mundial...</div></div>
  </div>
  <script src="app.js?v=football-data-01"></script>
</body>
</html>
