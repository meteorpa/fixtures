<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=550, initial-scale=1.0">
  <title>Mundial 2026</title>

  <script type="module" crossorigin src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 550px;
      height: 1030px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #e8edf2;
      font-family: Arial, Helvetica, sans-serif;
    }

    .worldcup-panel {
      width: 550px;
      height: 1030px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f4f7fa;
    }

    .worldcup-header {
      height: 82px;
      padding: 15px 18px;
      background: linear-gradient(135deg, #171d24 0%, #2b3540 100%);
      color: #ffffff;
      flex: 0 0 auto;
    }

    .worldcup-title {
      font-size: 25px;
      line-height: 28px;
      font-weight: 900;
    }

    .worldcup-subtitle {
      margin-top: 4px;
      font-size: 14px;
      color: #c9d1d8;
      font-weight: 700;
    }

    .section-title {
      height: 34px;
      padding: 8px 14px;
      background: #ffffff;
      border-bottom: 1px solid #dce3e8;
      color: #20282e;
      font-size: 13px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .matches-section {
      height: 914px;
      overflow: hidden;
      background: #ffffff;
      flex: 0 0 auto;
    }

    api-sports-widget {
      display: block;
      width: 100%;
      height: 100%;

      --primary-font-size: 0.78rem;
      --secondary-font-size: 0.72rem;
      --button-font-size: 0.74rem;
      --title-font-size: 0.84rem;
    }
  </style>
</head>

<body>
  <div class="worldcup-panel">

    <div class="worldcup-header">
      <div class="worldcup-title">Mundial 2026</div>
      <div class="worldcup-subtitle">Resultados en vivo y próximos partidos</div>
    </div>

    <div class="section-title">Calendario / resultados / grupos</div>

    <div class="matches-section">
      <api-sports-widget data-type="league"></api-sports-widget>
    </div>

  <api-sports-widget
    data-type="config"
    data-key="491d66a0e98cbe81dfa0706d2b6c5d33"
    data-sport="football"
    data-lang="es"
    data-theme="white"
    data-show-errors="true"
    data-show-logos="true"
    data-refresh="15"
    data-player-injuries="true"
    data-team-squad="true"
    data-team-statistics="true"     
    data-player-statistics="true" 
    data-game-tab="statistics"
    data-standings="true"
    data-target-standings="true"
    data-target-game="#game-content .card-body"
    data-target-player="modal"
    data-target-team="modal"
    data-tab="results"
    data-league="1"
    data-season="2026"
    </api-sports-widget>

  </div>
</body>
</html>
